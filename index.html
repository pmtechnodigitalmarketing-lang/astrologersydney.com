<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soul Astrology Centre</title>
    <!-- Preload LCP Image -->
    <link rel="preload" as="image" imagesrcset="/images/Master-Jai-Bn-1-480.webp 480w, /images/Master-Jai-Bn-1-640.webp 640w, /images/Master-Jai-Bn-1-768.webp 768w, /images/Master-Jai-Bn-1-960.webp 960w, /images/Master-Jai-Bn-1-1200.webp 1200w" imagesizes="100vw" fetchpriority="high">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script>
      (function() {
        function loadFont(href) {
          var link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = href;
          document.head.appendChild(link);
        }
        loadFont('https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap');
        loadFont('https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap');
      })();
    </script>

    <meta name="google-site-verification" content="GCt-LdExv6HW2sOu3K28jmAbq6y3-L5hYkElmYkcXtc" />
  </head>
  <body>
    <div id="root">
      <style>
        /* Minimal critical CSS for pre-render */
        body { margin: 0; background-color: #0f0c29; font-family: sans-serif; }
        .app-container { min-height: 100vh; display: flex; flex-direction: column; position: relative; }
        .cosmic-bg { position: fixed; inset: 0; z-index: -1; background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e); }
        .navbar { position: fixed; top: 10px; left: 0; right: 0; z-index: 100; max-width: 99.5%; margin: 0 auto; background: rgba(255, 255, 255, 0.95); border-radius: 50px; padding: 10px 30px; display: flex; justify-content: space-between; align-items: center; min-height: 95px; box-sizing: border-box; }
        .navbar-logo-img { height: 95px; width: auto; }
        .mobile-menu-toggle { background: none; border: none; }
        .classic-hero-section { position: relative; width: 100%; height: 100vh; overflow: hidden; }
        .banner-images-wrapper { position: absolute; inset: 0; }
        .classic-hero-bg-slide { width: 100%; height: 100%; object-fit: cover; }
        @media (min-width: 1024px) {
          .navbar { top: 5px; width: 96%; max-width: 1600px; padding: 5px 24px; min-height: auto; }
          .navbar-logo-img { height: 60px; }
          .mobile-menu-toggle { display: none; }
        }
      </style>
      <div class="app-container">
        <div class="cosmic-bg"></div>
        <header class="navbar glass-panel">
          <div class="navbar-container" style="display: flex; width: 100%; justify-content: space-between; align-items: center;">
            <a href="/" class="navbar-logo">
              <img src="/images/MJ-Logo-opt.webp" alt="Soul Astrology Centre Logo" class="navbar-logo-img" width="250" height="94">
            </a>
            <button class="mobile-menu-toggle" aria-label="Toggle Navigation">
              <span class="material-symbols-outlined" style="font-size: 24px;">menu</span>
            </button>
          </div>
        </header>
        <main class="main-content">
          <div class="home-container">
            <section class="classic-hero-section poster-layout">
              <div class="banner-images-wrapper">
                <picture>
                  <img
                    class="classic-hero-bg-slide active"
                    src="/images/Master-Jai-Bn-1.webp"
                    srcset="/images/Master-Jai-Bn-1-480.webp 480w, /images/Master-Jai-Bn-1-640.webp 640w, /images/Master-Jai-Bn-1-768.webp 768w, /images/Master-Jai-Bn-1-960.webp 960w, /images/Master-Jai-Bn-1-1200.webp 1200w"
                    sizes="100vw"
                    alt="GET YOUR EX LOVE BACK"
                    width="1920"
                    height="1080"
                    loading="eager"
                    fetchpriority="high"
                    decoding="async"
                  />
                </picture>
              </div>
            </section>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
